name: Terraform Resource Scanner
description: >
  Scans a Terraform directory recursively, extracts all module blocks and
  resource blocks from .tf files, and outputs a JSON summary of modules
  (name + source) and resources (type + human-readable service name).

inputs:
  terraform_dir:
    description: "Path to the Terraform directory to scan (relative to the repo root)."
    required: false
    default: "tf"
  mapping_repo:
    description: "GitHub repository (owner/name) hosting the service mapping JSON file."
    required: false
    default: "subhamay-bhattacharyya-gha/checkov-custom-policies"
  mapping_path:
    description: "Path to the service mapping JSON file inside the mapping repository."
    required: false
    default: "config/service-map.json"
  mapping_ref:
    description: "Git ref (branch, tag, or commit SHA) to fetch the mapping file from."
    required: false
    default: "main"
  github_token:
    description: "GitHub token used to fetch the mapping file (required for private repos)."
    required: false
    default: ""

outputs:
  result:
    description: >
      JSON string with keys:
        - modules: array of { name, source }
        - resources: array of { type, service }
        - modules_services: distinct list of all module sources and resource services
        - mapped_services: distinct list of mapped values (only when mapping_file is provided)
    value: ${{ steps.scan.outputs.result }}
  mapped_services:
    description: >
      JSON array of distinct mapped values looked up from the mapping_file.
    value: ${{ steps.scan.outputs.mapped_services }}

runs:
  using: node24
  main: dist/index.js
